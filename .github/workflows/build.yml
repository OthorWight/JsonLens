name: Build All Platforms

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential meson ninja-build pkg-config libsdl2-dev libgl1-mesa-dev
      
      - name: Fetch ImGui
        run: bash ./setup_imgui.sh

      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-Linux
          path: builddir/json-lens

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-SDL2
            
      - name: Fetch ImGui
        shell: bash
        run: bash ./setup_imgui.sh

      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir

      - name: Bundle Dependencies
        run: |
          # Finds all required MSYS2/UCRT64 DLLs (libgcc, libstdc++, SDL2, etc.) and copies them next to the executable
          ldd builddir/json-lens.exe | grep '/ucrt64/bin' | awk '{print $3}' | xargs cp -t builddir/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-Windows
          path: |
            builddir/json-lens.exe
            builddir/*.dll

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: brew install gcc meson ninja pkg-config sdl2
          
      - name: Fetch ImGui
        run: bash ./setup_imgui.sh

      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-macOS
          path: builddir/json-lens
