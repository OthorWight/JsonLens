name: Build All Platforms

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y valac meson ninja-build pkg-config libgtk-4-dev libgtksourceview-5-dev
      
      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-Linux
          path: builddir/json-lens

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-vala
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-gtksourceview5
            
      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-Windows
          path: builddir/json-lens.exe

  build-macos:
    name: Build on macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Dependencies
        run: brew install vala meson ninja pkg-config gtk4 gtksourceview5
          
      - name: Build
        run: |
          meson setup builddir
          ninja -C builddir
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JsonLens-macOS
          path: builddir/json-lens